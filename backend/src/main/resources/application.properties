spring.application.name=portfolio-backend

# Database Configuration
# Fallback to H2 if Neon is missing, so the app ALWAYS starts.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.jpa.database-platform=${SPRING_JPA_DIALECT:org.hibernate.dialect.H2Dialect}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# SSL is often needed for Neon
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
