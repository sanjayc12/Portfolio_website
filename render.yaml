services:
  # Backend Service
  - type: web
    name: portfolio-backend
    env: docker
    plan: free
    dockerContext: backend
    dockerfilePath: backend/Dockerfile

    envVars:
      - key: SPRING_DATASOURCE_URL
        value: # You will paste your Neon/Supabase URL here in the Render Dashboard
      - key: SERVER_PORT
        value: 8080

  # Frontend Service
  - type: web
    name: portfolio-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: portfolio-backend
          property: host
        prefix: https://
        suffix: /api
