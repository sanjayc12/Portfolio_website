services:
  # Backend Service
  - type: web
    name: portfolio-backend
    env: docker
    plan: free
    dockerContext: backend
    dockerfilePath: Dockerfile
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: portfolio-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: portfolio-db
          property: password
      - key: SERVER_PORT
        value: 8080


  # Frontend Service
  - type: web
    name: portfolio-frontend
    env: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: portfolio-backend
          property: host
        prefix: https://
        suffix: /api




databases:
  - name: portfolio-db
    plan: free
